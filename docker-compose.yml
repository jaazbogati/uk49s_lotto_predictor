
services:

  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       uk49s
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # ── FastAPI ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST:     db          # ← 'db' is the service name above
      DB_PORT:     5432
      DB_NAME:     uk49s
      DB_USER:     postgres
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ENV:     production
      APP_DEBUG:   "False"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # ── Streamlit ────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     uk49s
      DB_USER:     postgres
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ENV:     production
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network: